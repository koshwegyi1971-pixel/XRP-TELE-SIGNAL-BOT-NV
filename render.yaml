services:
  - type: worker
    name: xrp-tele-signal-bot-nv
    runtime: docker
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: "openai/gpt-4o-mini"
      - key: CHECK_INTERVAL
        value: "3600"
      - key: SYMBOL
        value: "XRP/USDT"
      - key: EXCHANGE_ID
        value: "kraken"
      - key: PORT
        value: "10000"
